<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="A political simulation game set in modern Latvia. Shape the future of a small Baltic nation." />
  <title>Amber Republic — Shape Latvia's Future</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root">
    <!-- Loading spinner shown before React mounts -->
    <div id="app-loader" style="
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F5F0E8;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      gap: 20px;
    ">
      <style>
        @keyframes ar-spin {
          to { transform: rotate(360deg); }
        }
        @keyframes ar-fade-in {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        #app-loader { animation: ar-fade-in 0.3s ease both; }
        #ar-spinner {
          width: 44px;
          height: 44px;
          border: 3px solid rgba(158, 48, 57, 0.15);
          border-top-color: #9E3039;
          border-radius: 50%;
          animation: ar-spin 0.9s linear infinite;
        }
        #ar-flag {
          display: flex;
          gap: 4px;
          margin-bottom: 4px;
        }
        #ar-flag span:nth-child(1), #ar-flag span:nth-child(3) {
          display: block; width: 48px; height: 3px;
          background: #9E3039; border-radius: 2px;
        }
        #ar-flag span:nth-child(2) {
          display: block; width: 24px; height: 3px;
          background: #fff; border-radius: 2px;
        }
        #ar-title {
          font-family: 'Lora', Georgia, serif;
          font-size: 1.6rem;
          font-weight: 700;
          color: #1C1917;
          letter-spacing: -0.01em;
          margin: 0;
        }
        #ar-subtitle {
          font-size: 0.7rem;
          font-weight: 500;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #9E3039;
          margin: 0;
        }
      </style>
      <div id="ar-flag"><span></span><span></span><span></span></div>
      <p id="ar-title">Amber Republic</p>
      <p id="ar-subtitle">Loading…</p>
      <div id="ar-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
