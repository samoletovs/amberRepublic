<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="A political simulation game set in modern Latvia. Shape the future of a small Baltic nation." />
  <title>Amber Republic — Shape Latvia's Future</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root">
    <div id="app-loader" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAFAF9;font-family:'Source Sans 3',system-ui,sans-serif">
      <style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}</style>
      <div style="font-size:3rem;animation:pulse 2s ease-in-out infinite">🏛️</div>
      <div style="width:32px;height:32px;border:3px solid rgba(184,134,11,.2);border-top-color:#B8860B;border-radius:50%;animation:spin .8s linear infinite;margin-top:1rem"></div>
      <p style="margin-top:1rem;font-size:.875rem;color:#78716C">Loading Amber Republic…</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
