version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Group react + react-dom (+ @types siblings) into ONE PR so they always
    # bump together. React 19 patch-version skew (e.g. react@19.2.6 vs
    # react-dom@19.2.5) triggers React error #527 and hangs the SWA with an
    # infinite loading spinner. Grouping ensures they land atomically.
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies