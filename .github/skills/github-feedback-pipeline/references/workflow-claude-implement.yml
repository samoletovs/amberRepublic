# Claude Triage + Auto-Implement Workflow
#
# Two-phase pipeline:
#   1. TRIAGE — Claude evaluates every new labeled issue, posts assessment, adds approval label
#   2. IMPLEMENT — Claude implements approved issues and creates a PR
#
# Triggers:
#   - New issue opened (if it has a trigger label)
#   - Label added to issue (trigger labels: enhancement, bug, game-balance)
#   - Comment with @claude on any issue
#
# Required secrets:
#   - ANTHROPIC_API_KEY: Anthropic API key for Claude
#
# Required labels (create via gh CLI):
#   - enhancement, bug, game-balance (trigger labels)
#   - approved, rejected, needs-info (triage outcome labels)

name: "Claude: Triage & Auto-implement"

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, labeled]

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Triage — auto-label + evaluate the issue
  # ──────────────────────────────────────────────
  triage:
    # Run on newly opened issues OR labeled issues that haven't been triaged yet
    if: >-
      github.event_name == 'issues' &&
      !contains(github.event.issue.labels.*.name, 'approved') &&
      !contains(github.event.issue.labels.*.name, 'rejected') &&
      !contains(github.event.issue.labels.*.name, 'needs-info')
    runs-on: ubuntu-latest
    concurrency:
      group: claude-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-label and Triage with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const existingLabels = issue.labels.map(l => l.name);

            // Step 1: Auto-label based on title emoji prefix (if not already labeled)
            const labelMap = [
              { pattern: '🐛 Bug Report', label: 'bug' },
              { pattern: '💡 Feature Idea', label: 'enhancement' },
              { pattern: '⚖️ Balance Issue', label: 'game-balance' },
            ];
            const triggerLabels = ['enhancement', 'bug', 'game-balance'];
            const match = labelMap.find(m => title.includes(m.pattern));

            if (match && !existingLabels.includes(match.label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [match.label]
              });
              existingLabels.push(match.label);
              console.log(`Auto-labeled: ${match.label}`);
            }

            // Step 2: Check if issue has a trigger label (after auto-labeling)
            const hasTrigger = existingLabels.some(l => triggerLabels.includes(l));
            if (!hasTrigger) {
              console.log('No trigger label found, skipping triage');
              return;
            }

            // Step 3: Fetch recent issues for duplicate detection
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 20,
              sort: 'created',
              direction: 'desc'
            });
            const otherIssues = recentIssues
              .filter(i => i.number !== issue.number)
              .map(i => `#${i.number}: ${i.title} [${i.state}]`)
              .join('\n');

            // Read CLAUDE.md for project context
            const fs = require('fs');
            let projectContext = '';
            if (fs.existsSync('CLAUDE.md')) {
              projectContext = fs.readFileSync('CLAUDE.md', 'utf8');
            }

            const triagePrompt = `You are a project maintainer triaging a GitHub issue.

            PROJECT CONTEXT:
            ${projectContext}

            ISSUE #${issue.number}: "${issue.title}"
            Labels: ${issue.labels.map(l => l.name).join(', ')}
            Body:
            ${issue.body || '(empty)'}

            RECENT ISSUES (for duplicate detection):
            ${otherIssues}

            EVALUATE this issue against these criteria:

            1. **Actionable**: Is it clear enough to implement? Does it describe a specific change?
            2. **Relevant**: Is it about this project? Not spam or off-topic?
            3. **Feasible**: Can it be solved with code changes? Is it within reasonable scope?
            4. **Safe**: No malicious intent, no security risks, no harmful content?
            5. **Not a duplicate**: Is there a similar recent issue already filed?
            6. **Value**: Will this genuinely improve the project for users?
            7. **Effort vs Impact**: Is the implementation effort proportional to the benefit?
            8. **Architectural fit**: Does it align with the project's architecture and patterns?
            9. **Scope**: Is this a focused change, or would it require rearchitecting large parts?

            DECISION — respond with exactly one of:
            - APPROVED — if the issue passes all criteria and is worth implementing
            - REJECTED — if it fails one or more criteria significantly
            - NEEDS_INFO — if it's potentially valid but too vague to act on

            FORMAT your response as:
            ## Triage: [APPROVED|REJECTED|NEEDS_INFO]

            **Summary**: One sentence explaining the decision.

            **Assessment**:
            - Actionable: ✅/❌ (brief note)
            - Relevant: ✅/❌
            - Feasible: ✅/❌
            - Safe: ✅/❌
            - Duplicate: ✅ unique / ❌ duplicate of #N
            - Value: ✅/❌
            - Effort/Impact: ✅/❌
            - Scope: ✅/❌

            **Recommendation**: What Claude should do if implementing this (brief).

            Be fair but maintain quality — approve things that will genuinely help the project,
            reject spam/nonsense/duplicates, and ask for info when the request is unclear.`;

            // Call Anthropic API directly for triage (lightweight, no code execution needed)
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1024,
                messages: [{ role: 'user', content: triagePrompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(`Anthropic API error: ${response.status} ${err}`);
              return;
            }

            const result = await response.json();
            const triageText = result.content[0].text;

            // Determine the label based on the response
            let label = 'needs-info';
            if (triageText.includes('## Triage: APPROVED')) {
              label = 'approved';
            } else if (triageText.includes('## Triage: REJECTED')) {
              label = 'rejected';
            }

            // Post the triage comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🤖 **Claude Triage**\n\n${triageText}`
            });

            // Add the triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [label]
            });

            // If rejected, close the issue
            if (label === 'rejected') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }

            console.log(`Issue #${issue.number} triaged as: ${label}`);

  # ──────────────────────────────────────────────
  # Phase 2: Implement — only for approved issues
  # ──────────────────────────────────────────────
  implement:
    # Run when "approved" label is added (by triage or manually)
    if: >-
      (github.event_name == 'issues' && github.event.action == 'labeled' &&
       github.event.label.name == 'approved') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    concurrency:
      group: claude-implement-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Implement with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "approved"
          prompt: |
            Read CLAUDE.md for the full architecture guide before making any changes.
            Keep changes minimal and focused on the issue.
            Run the project's build/test command to verify no errors before finishing.
