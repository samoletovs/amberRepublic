# Auto-Label Issues Workflow
#
# Parses the emoji prefix in issue titles created by the feedback component
# and adds the corresponding label. This is a safety net — the feedback button
# also passes labels via URL params, but those can get dropped if the user
# edits the form or creates issues manually.
#
# Mapping:
#   🐛 Bug Report     → bug
#   💡 Feature Idea    → enhancement
#   ⚖️ Balance Issue   → game-balance
#
# Customize the emoji-to-label mapping below to match your project's
# feedback categories.

name: "Auto-label feedback issues"

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label based on title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title;

            // Customize this mapping to match your feedback categories
            const labelMap = [
              { pattern: '🐛 Bug Report', label: 'bug' },
              { pattern: '💡 Feature Idea', label: 'enhancement' },
              { pattern: '⚖️ Balance Issue', label: 'game-balance' },
            ];

            const match = labelMap.find(m => title.includes(m.pattern));

            if (match) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [match.label]
              });
              console.log(`Added label: ${match.label}`);
            } else {
              console.log('No matching prefix found, skipping');
            }
