# Claude Implement Workflow
#
# Triggered by:
#   - repository_dispatch from triage workflow (when issue is approved)
#   - @claude comment on any issue
#
# This is a separate workflow from triage because GitHub Actions does not
# re-trigger workflows when labels/comments are added by GITHUB_TOKEN.
# The triage workflow fires a repository_dispatch event to bridge the gap.
#
# Required secrets:
#   - ANTHROPIC_API_KEY: Anthropic API key for Claude

name: "Claude: Implement approved issue"

on:
  repository_dispatch:
    types: [implement-issue]
  issue_comment:
    types: [created]

jobs:
  implement:
    if: >-
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    concurrency:
      group: claude-implement-${{ github.event.client_payload.issue_number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Implement with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          label_trigger: "approved"
          allowed_bots: "github-actions[bot]"
          prompt: |
            Read CLAUDE.md for the full architecture guide before making any changes.
            Keep changes minimal and focused on the issue.
            Run the project's build/test command to verify no errors before finishing.
