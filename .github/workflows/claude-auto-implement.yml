name: "Claude: Triage issues"

on:
  issues:
    types: [opened, labeled]

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Triage — auto-label + evaluate the issue
  # ──────────────────────────────────────────────
  triage:
    # Run on newly opened issues OR labeled issues that haven't been triaged yet
    if: >-
      github.event_name == 'issues' &&
      !contains(github.event.issue.labels.*.name, 'approved') &&
      !contains(github.event.issue.labels.*.name, 'rejected') &&
      !contains(github.event.issue.labels.*.name, 'needs-info')
    runs-on: ubuntu-latest
    concurrency:
      group: claude-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-label and Triage with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const existingLabels = issue.labels.map(l => l.name);

            // Step 1: Auto-label based on title emoji prefix (if not already labeled)
            const labelMap = [
              { pattern: '🐛 Bug Report', label: 'bug' },
              { pattern: '💡 Feature Idea', label: 'enhancement' },
              { pattern: '⚖️ Balance Issue', label: 'game-balance' },
            ];
            const triggerLabels = ['enhancement', 'bug', 'game-balance'];
            const match = labelMap.find(m => title.includes(m.pattern));

            if (match && !existingLabels.includes(match.label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [match.label]
              });
              existingLabels.push(match.label);
              console.log(`Auto-labeled: ${match.label}`);
            }

            // Step 2: Check if issue has a trigger label (after auto-labeling)
            const hasTrigger = existingLabels.some(l => triggerLabels.includes(l));
            if (!hasTrigger) {
              console.log('No trigger label found, skipping triage');
              return;
            }

            // Step 3: Fetch recent issues for duplicate detection
            const { data: recentIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 20,
              sort: 'created',
              direction: 'desc'
            });
            const otherIssues = recentIssues
              .filter(i => i.number !== issue.number)
              .map(i => `#${i.number}: ${i.title} [${i.state}]`)
              .join('\n');

            const fs = require('fs');
            let projectContext = '';
            if (fs.existsSync('CLAUDE.md')) {
              projectContext = fs.readFileSync('CLAUDE.md', 'utf8');
            }

            const triagePrompt = `You are a project maintainer triaging a GitHub issue.

            PROJECT CONTEXT:
            ${projectContext}

            ISSUE #${issue.number}: "${issue.title}"
            Labels: ${issue.labels.map(l => l.name).join(', ')}
            Body:
            ${issue.body || '(empty)'}

            RECENT ISSUES (for duplicate detection):
            ${otherIssues}

            EVALUATE this issue against these criteria:
            1. Actionable: Is it clear enough to implement?
            2. Relevant: Is it about this project?
            3. Feasible: Can it be solved with code changes within reasonable scope?
            4. Safe: No malicious intent or security risks?
            5. Not a duplicate: No similar recent issue?
            6. Value: Will this genuinely improve the project for users?
            7. Effort vs Impact: Is the work proportional to the benefit?
            8. Architectural fit: Does it align with the project's patterns?
            9. Scope: Is it a focused change (not rearchitecting)?

            DECISION — respond with exactly one of:
            - APPROVED — passes all criteria, worth implementing
            - REJECTED — fails one or more criteria significantly
            - NEEDS_INFO — potentially valid but too vague

            FORMAT:
            ## Triage: [APPROVED|REJECTED|NEEDS_INFO]

            **Summary**: One sentence.

            **Assessment**:
            - Actionable: ✅/❌ (note)
            - Relevant: ✅/❌
            - Feasible: ✅/❌
            - Safe: ✅/❌
            - Duplicate: ✅ unique / ❌ duplicate of #N
            - Value: ✅/❌
            - Effort/Impact: ✅/❌
            - Scope: ✅/❌

            **Recommendation**: Brief implementation approach if approved.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1024,
                messages: [{ role: 'user', content: triagePrompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(`Anthropic API error: ${response.status} ${err}`);
              return;
            }

            const result = await response.json();
            const triageText = result.content[0].text;

            let label = 'needs-info';
            if (triageText.includes('## Triage: APPROVED')) label = 'approved';
            else if (triageText.includes('## Triage: REJECTED')) label = 'rejected';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `🤖 **Claude Triage**\n\n${triageText}`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [label]
            });

            if (label === 'rejected') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }

            // If approved, trigger implementation via repository_dispatch
            // (GitHub won't re-trigger workflows from labels or comments added by GITHUB_TOKEN,
            // but repository_dispatch events DO trigger new workflow runs)
            if (label === 'approved') {
              await github.rest.repos.createDispatchEvent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                event_type: 'implement-issue',
                client_payload: { issue_number: issue.number }
              });
            }

            console.log(`Issue #${issue.number} triaged as: ${label}`);
